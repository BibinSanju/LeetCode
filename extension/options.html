<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Local LeetCode Sync</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="lls-options">
    <main class="lls-options-panel">
      <h1>Local LeetCode Sync</h1>
      <label>
        Server URL
        <input id="serverUrl" type="text" placeholder="http://127.0.0.1:8765">
      </label>
      <label>
        Local token
        <input id="token" type="password" placeholder="Paste token from the Python server">
      </label>
      <div class="lls-options-actions">
        <button id="save">Save</button>
        <button id="test" type="button">Test server</button>
      </div>
      <pre id="status"></pre>
    </main>
    <script src="options.js"></script>
  </body>
</html>
